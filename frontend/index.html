<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Rental System - Login</title>
    <link rel="stylesheet" href="css/auth.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="auth-wrapper">
            <!-- Left Side - Branding -->
            <div class="auth-left">
                <div class="brand">
                    <i class="fas fa-car"></i>
                    <h1>Car Rental</h1>
                    <p>Your Journey, Our Priority</p>
                </div>
                <div class="features">
                    <div class="feature">
                        <i class="fas fa-shield-alt"></i>
                        <span>Secure & Safe</span>
                    </div>
                    <div class="feature">
                        <i class="fas fa-star"></i>
                        <span>Loyalty Rewards</span>
                    </div>
                    <div class="feature">
                        <i class="fas fa-tags"></i>
                        <span>Best Prices</span>
                    </div>
                </div>
            </div>

            <!-- Right Side - Auth Forms -->
            <div class="auth-right">
                <!-- Login Form -->
                <div id="loginForm" class="auth-form active">
                    <h2>Welcome Back</h2>
                    <p class="subtitle">Login to your account</p>
                    
                    <form onsubmit="handleLogin(event)">
                        <div class="form-group">
                            <label><i class="fas fa-user"></i> Username</label>
                            <input type="text" id="loginUsername" placeholder="Enter username" required>
                        </div>
                        
                        <div class="form-group">
                            <label><i class="fas fa-lock"></i> Password</label>
                            <input type="password" id="loginPassword" placeholder="Enter password" required>
                        </div>
                        
                        <button type="submit" class="btn-primary">
                            <i class="fas fa-sign-in-alt"></i> Login
                        </button>
                    </form>
                    
                    <p class="switch-form">
                        Don't have an account? 
                        <a href="#" onclick="switchToRegister()">Register here</a>
                    </p>
                    
                    <div class="demo-credentials">
                        <p><strong>Demo Accounts:</strong></p>
                        <p>Manager: admin / admin123</p>
                    </div>
                </div>

                <!-- Register Form -->
                <div id="registerForm" class="auth-form">
                    <h2>Create Account</h2>
                    <p class="subtitle">Join us today</p>
                    
                    <form onsubmit="handleRegister(event)">
                        <div class="form-group">
                            <label><i class="fas fa-user"></i> Full Name</label>
                            <input type="text" id="regName" placeholder="Enter full name" required>
                        </div>
                        
                        <div class="form-group">
                            <label><i class="fas fa-phone"></i> Phone</label>
                            <input type="tel" id="regPhone" placeholder="Enter phone number" required>
                        </div>
                        
                        <div class="form-group">
                            <label><i class="fas fa-envelope"></i> Email</label>
                            <input type="email" id="regEmail" placeholder="Enter email" required>
                        </div>
                        
                        <div class="form-group">
                            <label><i class="fas fa-user-circle"></i> Username</label>
                            <input type="text" id="regUsername" placeholder="Choose username" required>
                        </div>
                        
                        <div class="form-group">
                            <label><i class="fas fa-lock"></i> Password</label>
                            <input type="password" id="regPassword" placeholder="Choose password" required minlength="6">
                        </div>
                        
                        <button type="submit" class="btn-primary">
                            <i class="fas fa-user-plus"></i> Register
                        </button>
                    </form>
                    
                    <p class="switch-form">
                        Already have an account? 
                        <a href="#" onclick="switchToLogin()">Login here</a>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay">
        <div class="spinner"></div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>

    <script src="js/auth.js"></script>
</body>
</html>
