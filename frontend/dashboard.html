<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Rental - Dashboard</title>
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-brand">
                <i class="fas fa-car"></i>
                <span>Car Rental</span>
            </div>
            
            <div class="nav-menu">
                <a href="#" class="nav-link active"><i class="fas fa-home"></i> Home</a>
                <a href="#" class="nav-link"><i class="fas fa-car"></i> My Rentals</a>
                <a href="#" class="nav-link"><i class="fas fa-star"></i> Loyalty</a>
                <a href="#" class="nav-link"><i class="fas fa-tags"></i> Promos</a>
            </div>
            
            <div class="nav-user">
                <div class="user-info">
                    <i class="fas fa-user-circle"></i>
                    <span id="userName">User</span>
                    <span class="user-badge" id="userTier">BRONZE</span>
                </div>
                <button onclick="logout()" class="btn-logout">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-content">
            <h1>Find Your Perfect Ride</h1>
            <p>Choose from our premium collection of vehicles</p>
            
            <!-- Search Bar -->
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="Search by brand, model, or type..." onkeyup="filterCars()">
                <button class="btn-search"><i class="fas fa-search"></i></button>
            </div>
            
            <!-- Filters -->
            <div class="filters">
                <select id="fuelFilter" onchange="filterCars()">
                    <option value="">All Fuel Types</option>
                    <option value="Petrol">Petrol</option>
                    <option value="Diesel">Diesel</option>
                    <option value="Electric">Electric</option>
                </select>
                
                <select id="priceFilter" onchange="filterCars()">
                    <option value="">All Prices</option>
                    <option value="0-50">$0 - $50</option>
                    <option value="50-80">$50 - $80</option>
                    <option value="80-150">$80+</option>
                </select>
                
                <button class="btn-filter" onclick="resetFilters()">
                    <i class="fas fa-redo"></i> Reset
                </button>
            </div>
        </div>
    </section>

    <!-- Cars Grid -->
    <section class="cars-section">
        <div class="container">
            <div class="section-header">
                <h2>Available Cars</h2>
                <p id="carCount">Loading...</p>
            </div>
            
            <div id="carsGrid" class="cars-grid">
                <!-- Cars will be loaded here -->
            </div>
        </div>
    </section>

    <!-- Rental Modal -->
    <div id="rentalModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeRentalModal()">&times;</span>
            <h2>Rent Car</h2>
            
            <div class="modal-car-info" id="modalCarInfo">
                <!-- Car info will be inserted here -->
            </div>
            
            <form onsubmit="handleRental(event)">
                <div class="form-group">
                    <label><i class="fas fa-calendar"></i> Rental Days</label>
                    <input type="number" id="rentalDays" min="1" value="1" required onchange="calculateTotal()">
                </div>
                
                <div class="form-group">
                    <label><i class="fas fa-shield-alt"></i> Insurance</label>
                    <select id="insurance" onchange="calculateTotal()">
                        <option value="NONE">None</option>
                        <option value="BASIC">Basic ($10/day)</option>
                        <option value="PREMIUM">Premium ($20/day)</option>
                        <option value="FULL">Full ($35/day)</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label><i class="fas fa-tag"></i> Promo Code</label>
                    <input type="text" id="promoCode" placeholder="Enter promo code">
                </div>
                
                <div class="price-breakdown">
                    <div class="price-row">
                        <span>Base Price:</span>
                        <span id="basePrice">$0</span>
                    </div>
                    <div class="price-row">
                        <span>Insurance:</span>
                        <span id="insurancePrice">$0</span>
                    </div>
                    <div class="price-row">
                        <span>Discount:</span>
                        <span id="discount">$0</span>
                    </div>
                    <div class="price-row total">
                        <span>Total:</span>
                        <span id="totalPrice">$0</span>
                    </div>
                </div>
                
                <button type="submit" class="btn-primary">
                    <i class="fas fa-check"></i> Confirm Rental
                </button>
            </form>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay">
        <div class="spinner"></div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>

    <script src="js/dashboard.js"></script>
</body>
</html>
